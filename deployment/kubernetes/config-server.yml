apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: aisales/.0.0-SNAPSHOT
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: aisales
spec:
  selector:
    app: config-server
  ports:
    - port: 80
      targetPort: 8080
