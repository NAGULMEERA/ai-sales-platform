apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-service
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: integration-service
  template:
    metadata:
      labels:
        app: integration-service
    spec:
      containers:
        - name: integration-service
          image: aisales/.0.0-SNAPSHOT
          ports:
            - containerPort: 8092
---
apiVersion: v1
kind: Service
metadata:
  name: integration-service
  namespace: aisales
spec:
  selector:
    app: integration-service
  ports:
    - port: 80
      targetPort: 8092
