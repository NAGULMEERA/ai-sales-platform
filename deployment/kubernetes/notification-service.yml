apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: aisales/notification-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/aisales_notification
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_PASSWORD
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_FROM
            - name: SMTP_AUTH
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_AUTH
            - name: SMTP_STARTTLS
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_STARTTLS
            - name: NOTIFICATION_DELIVERY_MODE
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: NOTIFICATION_DELIVERY_MODE
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: aisales
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8090
