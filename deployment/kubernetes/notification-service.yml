apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: aisales
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: notification-service
          image: aisales/notification-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/aisales_notification
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_PASSWORD
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_FROM
            - name: SMTP_AUTH
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_AUTH
            - name: SMTP_STARTTLS
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: SMTP_STARTTLS
            - name: NOTIFICATION_DELIVERY_MODE
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: NOTIFICATION_DELIVERY_MODE
            - name: AISALES_SECURITY_JWT_JWK_SET_URI
              value: http://identity-service:8081/.well-known/jwks.json
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: aisales
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8090
