apiVersion: apps/v1
kind: Deployment
metadata:
  name: deal-service
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deal-service
  template:
    metadata:
      labels:
        app: deal-service
    spec:
      containers:
        - name: deal-service
          image: aisales/deal-service:latest
          ports:
            - containerPort: 8097
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/deal_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_PASSWORD
            - name: AISALES_SECURITY_JWT_JWK_SET_URI
              value: http://identity-service:8081/.well-known/jwks.json          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8097
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: deal-service
  namespace: aisales
spec:
  selector:
    app: deal-service
  ports:
    - port: 80
      targetPort: 8097
