# Production secrets — DO NOT commit real values.
# Source of truth in production: Vault / AWS Secrets Manager / GCP Secret Manager
# synced into this Secret via External Secrets Operator
# (see external-secrets/vault-aisales-secrets.yaml).
#
# Local/dev: apply with placeholders, or skip and use application-local*.yml.
apiVersion: v1
kind: Secret
metadata:
  name: aisales-secrets
  namespace: aisales
  labels:
    app.kubernetes.io/part-of: ai-sales-platform
    aisales.io/secret-store: external
type: Opaque
stringData:
  # Shared platform JWT (HS256) — min 256 bits. Same value for identity + gateway + resource servers.
  JWT_SECRET: changeme-in-production-use-vault
  # Database
  DB_USERNAME: aisales
  DB_PASSWORD: changeme-in-production-use-vault
  # Google OAuth (identity-service)
  GOOGLE_CLIENT_ID: changeme
  GOOGLE_CLIENT_SECRET: changeme
  # SMTP (notification-service)
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USERNAME: changeme
  SMTP_PASSWORD: changeme
  SMTP_FROM: noreply@example.com
  SMTP_AUTH: "true"
  SMTP_STARTTLS: "true"
  NOTIFICATION_DELIVERY_MODE: smtp
  # AI providers (ai-service)
  OPENAI_API_KEY: changeme
