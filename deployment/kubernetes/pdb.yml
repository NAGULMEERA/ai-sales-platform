# Pod Disruption Budgets — keep at least one pod during voluntary disruptions.
# Pair with HPA minReplicas >= 2 for listed services.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: aisales
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
