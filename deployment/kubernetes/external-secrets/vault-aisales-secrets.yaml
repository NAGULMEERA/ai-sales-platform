# Example: sync production secrets from HashiCorp Vault into Kubernetes
# using External Secrets Operator (ESO).
#
# Prerequisites:
#   - ESO installed in the cluster
#   - Vault KV v2 path: secret/data/aisales/platform
#   - Vault auth (Kubernetes auth or AppRole) configured for ESO
#
# Flow (Rule 06):
#   Vault / Secret Manager  →  ExternalSecret  →  K8s Secret(aisales-secrets)  →  Pod env
#
# Apps never talk to Vault directly. Config Server must not store these values.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aisales-vault
  namespace: aisales
spec:
  provider:
    vault:
      server: https://vault.example.com
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: aisales-eso
          serviceAccountRef:
            name: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aisales-secrets
  namespace: aisales
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aisales-vault
    kind: SecretStore
  target:
    name: aisales-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: aisales/platform
        property: jwt_secret
    - secretKey: DB_USERNAME
      remoteRef:
        key: aisales/platform
        property: db_username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: aisales/platform
        property: db_password
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: aisales/platform
        property: google_client_id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: aisales/platform
        property: google_client_secret
    - secretKey: SMTP_HOST
      remoteRef:
        key: aisales/platform
        property: smtp_host
    - secretKey: SMTP_PORT
      remoteRef:
        key: aisales/platform
        property: smtp_port
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: aisales/platform
        property: smtp_username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: aisales/platform
        property: smtp_password
    - secretKey: SMTP_FROM
      remoteRef:
        key: aisales/platform
        property: smtp_from
    - secretKey: SMTP_AUTH
      remoteRef:
        key: aisales/platform
        property: smtp_auth
    - secretKey: SMTP_STARTTLS
      remoteRef:
        key: aisales/platform
        property: smtp_starttls
    - secretKey: NOTIFICATION_DELIVERY_MODE
      remoteRef:
        key: aisales/platform
        property: notification_delivery_mode
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: aisales/platform
        property: openai_api_key
