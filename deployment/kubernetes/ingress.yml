# TLS Ingress — requires a cert (cert-manager Certificate or pre-created tls secret).
# Create secret:
#   kubectl -n aisales create secret tls aisales-tls \
#     --cert=api.crt --key=api.key
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aisales-ingress
  namespace: aisales
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aisales.local
        - api.aisales.example.com
      secretName: aisales-tls
  rules:
    - host: api.aisales.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: api.aisales.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
