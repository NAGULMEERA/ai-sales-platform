apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aisales-ingress
  namespace: aisales
spec:
  rules:
    - host: api.aisales.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
