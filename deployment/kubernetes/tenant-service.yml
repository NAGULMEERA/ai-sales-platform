apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: aisales
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
        - name: tenant-service
          image: aisales/tenant-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/aisales_tenant
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: aisales
spec:
  selector:
    app: tenant-service
  ports:
    - port: 8082
      targetPort: 8082
