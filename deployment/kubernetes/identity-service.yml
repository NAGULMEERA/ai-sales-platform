apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: aisales
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: aisales/identity-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/aisales_identity
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: aisales
spec:
  selector:
    app: identity-service
  ports:
    - port: 8081
      targetPort: 8081
