apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: aisales/.0.0-SNAPSHOT
          ports:
            - containerPort: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: aisales
spec:
  selector:
    app: ai-service
  ports:
    - port: 80
      targetPort: 8088
