apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: aisales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: aisales/ai-service:latest
          ports:
            - containerPort: 8088
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ai_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: DB_PASSWORD
            - name: AISALES_SECURITY_JWT_JWK_SET_URI
              value: http://identity-service:8081/.well-known/jwks.json            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: aisales
spec:
  selector:
    app: ai-service
  ports:
    - port: 80
      targetPort: 8088
