apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aisales
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api-gateway
          image: aisales/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://service-registry:8761/eureka/
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: aisales-secrets
                  key: JWT_PUBLIC_KEY_PEM
            # Honor X-Forwarded-For only from in-cluster / private peers (ingress).
            - name: AISALES_GATEWAY_RATE_LIMIT_TRUSTED_PROXY_CIDRS_0
              value: 10.0.0.0/8
            - name: AISALES_GATEWAY_RATE_LIMIT_TRUSTED_PROXY_CIDRS_1
              value: 172.16.0.0/12
            - name: AISALES_GATEWAY_RATE_LIMIT_TRUSTED_PROXY_CIDRS_2
              value: 192.168.0.0/16
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aisales
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
