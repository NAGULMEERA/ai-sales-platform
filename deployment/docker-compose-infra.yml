services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aisales-postgres
    environment:
      POSTGRES_USER: aisales
      POSTGRES_PASSWORD: aisales
      POSTGRES_DB: aisales
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    networks:
      - aisales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aisales-redis
    ports:
      - "6379:6379"
    networks:
      - aisales-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aisales-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: aisales-kafka-cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - aisales-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aisales-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - aisales-network
    depends_on:
      - kafka

  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    container_name: aisales-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../infrastructure/monitoring/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - aisales-network

  zipkin:
    image: openzipkin/zipkin:3.2
    container_name: aisales-zipkin
    ports:
      - "9411:9411"
    networks:
      - aisales-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: aisales-prometheus
    volumes:
      - ../infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - aisales-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aisales-grafana
    ports:
      - "3000:3000"
    networks:
      - aisales-network

  embedding-tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: aisales-embedding-tei
    environment:
      MODEL_ID: BAAI/bge-m3
    ports:
      - "8099:80"
    networks:
      - aisales-network

volumes:
  postgres-data:

networks:
  aisales-network:
    driver: bridge
