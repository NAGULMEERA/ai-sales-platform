services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aisales-postgres
    environment:
      POSTGRES_USER: aisales
      POSTGRES_PASSWORD: aisales
      POSTGRES_DB: aisales
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    networks:
      - aisales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aisales-redis
    ports:
      - "6379:6379"
    networks:
      - aisales-network

  # Local SMTP catcher — verification/reset emails land in the web UI (not a real ISP mailbox).
  # SMTP: localhost:1025  |  Inbox UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: aisales-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - aisales-network
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aisales-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: aisales-kafka-cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - aisales-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aisales-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - aisales-network
    depends_on:
      - kafka

  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    container_name: aisales-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../infrastructure/monitoring/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - aisales-network

  zipkin:
    image: openzipkin/zipkin:3.2
    container_name: aisales-zipkin
    ports:
      - "9411:9411"
    networks:
      - aisales-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: aisales-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ../infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../infrastructure/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    networks:
      - aisales-network
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aisales-alertmanager
    volumes:
      - ../infrastructure/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - aisales-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aisales-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - aisales-network
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.0.0
    container_name: aisales-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../infrastructure/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - aisales-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: aisales-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ../infrastructure/monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      # OTLP for direct Tempo ingest (collector prefers tempo:4317 on the compose network)
      - "4319:4317"
    networks:
      - aisales-network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: aisales-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../infrastructure/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    networks:
      - aisales-network
    depends_on:
      - loki

  embedding-tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: aisales-embedding-tei
    environment:
      MODEL_ID: BAAI/bge-m3
    ports:
      - "8099:80"
    networks:
      - aisales-network

volumes:
  postgres-data:
  loki-data:
  tempo-data:

networks:
  aisales-network:
    name: aisales-network
    driver: bridge
