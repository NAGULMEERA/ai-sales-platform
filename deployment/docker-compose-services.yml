# Application services for local development.
# Requires: docker compose -f deployment/docker-compose-infra.yml up -d
# Or use umbrella: docker compose -f deployment/docker-compose.yml up -d --build
#
# Images build from repository root (multi-stage Dockerfiles).

x-jvm-service: &jvm-service
  networks:
    - aisales-network
  restart: unless-stopped
  environment: &jvm-env
    SPRING_PROFILES_ACTIVE: docker
    SPRING_DATA_REDIS_HOST: redis
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces

services:
  service-registry:
    <<: *jvm-service
    build:
      context: ..
      dockerfile: infrastructure/service-registry/Dockerfile
    image: aisales/service-registry:local
    container_name: aisales-service-registry
    ports:
      - "8761:8761"

  config-server:
    <<: *jvm-service
    build:
      context: ..
      dockerfile: infrastructure/config-server/Dockerfile
    image: aisales/config-server:local
    container_name: aisales-config-server
    ports:
      - "8888:8888"
    environment:
      <<: *jvm-env
      SPRING_PROFILES_ACTIVE: native,docker
    depends_on:
      - service-registry

  api-gateway:
    <<: *jvm-service
    build:
      context: ..
      dockerfile: infrastructure/api-gateway/Dockerfile
    image: aisales/api-gateway:local
    container_name: aisales-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
      - config-server

  identity-service:
    <<: *jvm-service
    build:
      context: ..
      dockerfile: backend/services/identity-service/Dockerfile
    image: aisales/identity-service:local
    container_name: aisales-identity-service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry
      - config-server

  tenant-service:
