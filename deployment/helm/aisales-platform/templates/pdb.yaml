{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.pdb $svc.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ include "aisales.namespace" $ }}
  labels:
    app: {{ $name }}
    {{- include "aisales.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ $svc.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ $name }}
      {{- if eq $.Values.global.deploymentStrategy "blueGreen" }}
      color: {{ $.Values.global.activeColor | quote }}
      {{- end }}
{{- end }}
{{- end }}
