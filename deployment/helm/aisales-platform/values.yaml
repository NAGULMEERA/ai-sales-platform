global:
  namespace: aisales
  imageRegistry: aisales
  imageTag: latest
  imagePullPolicy: IfNotPresent
  # Blue/Green: activeColor selects which Deployment color the Service targets.
  # Deploy inactive color first, smoke-test, then flip activeColor and upgrade.
  deploymentStrategy: rolling # rolling | blueGreen
  activeColor: blue
  inactiveColor: green
  # Optional per-color tags for blue/green (fallback: imageTag).
  # Example: colorImageTags: { blue: v1.2.3, green: v1.2.4 }
  colorImageTags: {}

ingress:
  enabled: true
  className: nginx
  hosts:
    - api.aisales.local
    - api.aisales.example.com
  tls:
    enabled: true
    secretName: aisales-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

config:
  springProfilesActive: prod
  environment: prod
  tracingSampleRate: "0.1"
  jwksUri: http://identity-service:8081/.well-known/jwks.json

secrets:
  # Prefer External Secrets Operator in production.
  create: true
  existingSecret: aisales-secrets

networkPolicy:
  enabled: true

defaultProbes:
  startup:
    path: /actuator/health/readiness
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 20
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

defaultResources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1536Mi

rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

services:
  api-gateway:
    enabled: true
    image: api-gateway
    port: 8080
    replicas: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      cpu: 70
    pdb:
      enabled: true
      minAvailable: 1
  service-registry:
    enabled: true
    image: service-registry
    port: 8761
    replicas: 1
    hpa:
      enabled: false
    pdb:
      enabled: false
  config-server:
