name: Docker Build

on:
  push:
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: ./mvnw clean package -DskipTests -B
      - run: docker build -t aisales/identity-service:${{ github.ref_name }} services/identity-service
      - run: docker build -t aisales/tenant-service:${{ github.ref_name }} services/tenant-service
