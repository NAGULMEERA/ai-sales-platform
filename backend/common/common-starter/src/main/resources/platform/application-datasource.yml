# Shared HikariCP defaults. Import via:
#   spring.config.import: optional:classpath:platform/application-datasource.yml
# Override per service with HIKARI_MAX_POOL / HIKARI_MIN_IDLE when needed.

spring:
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:3000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      pool-name: ${spring.application.name:aisales}-hikari
