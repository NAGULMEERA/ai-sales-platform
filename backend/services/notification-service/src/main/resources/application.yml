server:
  port: 8090

spring:
  application:
    name: notification-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-prod.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/aisales_notification
    username: ${DB_USERNAME:aisales}
    # Production: Vault/Secret Manager → K8s Secret → DB_PASSWORD / SPRING_DATASOURCE_PASSWORD.
    # Local profile sets an explicit password in application-local.yml.
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          # Outbound SMTP must never block indefinitely (Rule 08/09 resilience: sensible timeouts).
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: ${SMTP_CONNECT_TIMEOUT_MS:5000}
          timeout: ${SMTP_READ_TIMEOUT_MS:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT_MS:5000}

aisales:
  security:
    use-platform-defaults: false
  events:
    default-topic: aisales-events
    outbox:
      enabled: false
    inbox:
      enabled: true
  notification:
    # Default remains log for safety; local profile overrides to smtp (Mailpit).
    delivery-mode: ${NOTIFICATION_DELIVERY_MODE:log}
    from-address: ${SMTP_FROM:noreply@aisales.local}
    app-name: AI Sales Platform

resilience4j:
  retry:
    instances:
      # Guards the outbound SMTP send. Kept deliberately low (2 total attempts, i.e. 1 retry):
      # unlike a pure read, an SMTP send is not perfectly idempotent (a connection drop after the
      # server accepted DATA could in rare cases retry a message that actually went out), so this
      # trades a small chance of a duplicate transactional email for a much larger reduction in
      # emails dropped due to a single transient connection blip. Only connection/timeout failures
      # are retried; MailAuthenticationException (bad credentials) is never retried.
      smtpEmail:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.3
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
  bulkhead:
    instances:
      # Cap concurrent SMTP sends so provider/thread pools are not saturated under Kafka bursts.
      smtpEmail:
        max-concurrent-calls: 10
        max-wait-duration: 0ms
  circuitbreaker:
    instances:
      # External SMTP provider — stop hammering a down mail server (Rule 09/10). Auth/config
      # failures (MailAuthenticationException) do not count toward opening the breaker.
      smtpEmail:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
