# Local dev — Kafka consumer + SMTP (Mailpit by default).
# Requires: Postgres (5433), Kafka (9092), Mailpit (1025/8025).
# Infra: docker compose -f deployment/docker-compose-infra.yml up -d
# Optional secrets: application-local-secrets.yml (gitignored)

spring:
  config:
    import: optional:classpath:application-local-secrets.yml
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5433/aisales_notification
    username: aisales
    password: aisales
  kafka:
    bootstrap-servers: localhost:9092
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: ${SMTP_CONNECT_TIMEOUT_MS:5000}
          timeout: ${SMTP_READ_TIMEOUT_MS:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT_MS:5000}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  security:
    jwt:
      public-key-location: classpath:jwt/local-public.pem
  events:
    default-topic: aisales-events
    inbox:
      enabled: true
  notification:
    delivery-mode: smtp
    from-address: ${SMTP_FROM:noreply@aisales.local}
    app-name: AI Sales Platform

management:
  tracing:
    enabled: false

logging:
  level:
    com.aisales.notification: INFO
