spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5433/billing_db
    username: aisales
    password: aisales

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  clients:
    ai-service:
      url: http://localhost:8088
  billing:
    payment:
      # Plug/flag — change only `provider` (STUB | STRIPE).
      # Dev: STUB. Prod: STRIPE + stripe.enabled=true + STRIPE_API_KEY.
      provider: STUB
      stub:
        enabled: true
      stripe:
        enabled: false
        api-key: ${STRIPE_API_KEY:}
        auto-confirm: true

logging:
  level:
    com.aisales.billing: INFO
