server:
  port: 8091

spring:
  application:
    name: billing-service
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-prod.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/billing_db
    username: aisales
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:aisales}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

aisales:
  clients:
    ai-service:
      url: http://localhost:8088
  billing:
    payment:
      # Plug/flag: STUB | STRIPE
      provider: STUB
      stub:
        enabled: true
      stripe:
        enabled: false
        api-key: ${STRIPE_API_KEY:}
        auto-confirm: false
        default-payment-method: pm_card_visa
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
        webhook-tolerance-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
