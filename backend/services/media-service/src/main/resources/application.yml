server:
  port: 8095

spring:
  application:
    name: media-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/media_db
    username: aisales
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:aisales}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

aisales:
  media:
    # Plug/flag: LOCAL | S3 (matching bean must be available)
    storage: LOCAL
    local:
      base-path: ./data/media
    s3:
      enabled: false
      bucket: aisales-media
      region: us-east-1
      endpoint: ${AWS_S3_ENDPOINT:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      path-style-access: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
