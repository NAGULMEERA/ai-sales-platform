aisales:
  api:
    title: Identity Service API
    description: Authentication, authorization, tenant onboarding, subscriptions
    version: v1
  security:
    use-platform-defaults: false
    jwt:
      # RS256: identity signs with the private key; others validate via public key or JWKS.
      # Production private key: Vault/Secret Manager → JWT_PRIVATE_KEY_PEM (or file location).
      signing-enabled: true
      private-key-location: ${JWT_PRIVATE_KEY_LOCATION:${JWT_PRIVATE_KEY_PEM:classpath:jwt/local-private.pem}}
      public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:jwt/local-public.pem}
      key-id: ${JWT_KEY_ID:aisales-1}
      access-token-expiration-ms: 3600000
      refresh-token-expiration-ms: 86400000
  auth:
    auto-login-after-register: false
    require-email-verification-for-login: true
    email-verification-expiration-hours: 24
    password-reset-expiration-hours: 1
    verification-link-base-url: http://localhost:3000/verify-email
    password-reset-link-base-url: http://localhost:3000/reset-password
    max-failed-login-attempts: 5
    lockout-duration-minutes: 15
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: true
  oauth2:
    # Google OAuth2 login: authorization-code exchange, UserInfo call, and JWK Set
    # fetch. All three are small, fast JSON/JWK exchanges over the public internet, so
    # the read timeout stays short despite the call being external.
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
  startup-validation:
    enabled: true
    validate-flyway: true
    validate-redis: true
    validate-kafka: true
    required-config-values:
      - aisales.security.jwt.private-key-location
    required-tables:
      - users
      - tenants
      - refresh_tokens
      - audit_logs
      - outbox_events
      - permissions
      - role_permissions

spring:
  application:
    name: identity-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
      - optional:classpath:platform/application-openapi.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/aisales_identity
    username: ${DB_USERNAME:aisales}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, profile, email
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
