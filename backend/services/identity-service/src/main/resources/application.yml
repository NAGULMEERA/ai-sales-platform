aisales:
  api:
    title: Identity Service API
    description: Authentication, authorization, tenant onboarding, subscriptions
    version: v1
  security:
    use-platform-defaults: false
    jwt:
      # Production: inject via Vault/Secret Manager → env JWT_SECRET (or AISALES_SECURITY_JWT_SECRET).
      # Local profile supplies a dev default in application-local.yml.
      secret: ${JWT_SECRET:${AISALES_SECURITY_JWT_SECRET:}}
      access-token-expiration-ms: 3600000
      refresh-token-expiration-ms: 86400000
  auth:
    auto-login-after-register: false
    require-email-verification-for-login: true
    email-verification-expiration-hours: 24
    password-reset-expiration-hours: 1
    verification-link-base-url: http://localhost:3000/verify-email
    password-reset-link-base-url: http://localhost:3000/reset-password
  notification:
    enabled: true
    base-url: http://localhost:8090
    fallback-logging: true
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: true
  http:
    # Outbound calls to notification-service, an internal same-network dependency.
    # Rule 08/09: every outbound HTTP client must have sensible, non-infinite
    # connect/read timeouts; internal calls use tighter budgets than internet-facing
    # ones (see RestClientConfiguration for the full rationale).
    connect-timeout-ms: 2000
    read-timeout-ms: 5000
  oauth2:
    # Google OAuth2 login: authorization-code exchange, UserInfo call, and JWK Set
    # fetch. All three are small, fast JSON/JWK exchanges over the public internet, so
    # the read timeout stays short despite the call being external.
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
  startup-validation:
    enabled: true
    validate-flyway: true
    validate-redis: true
    validate-kafka: true
    required-config-values:
      - aisales.security.jwt.secret
    required-tables:
      - users
      - tenants
      - refresh_tokens
      - audit_logs
      - outbox_events
      - permissions
      - role_permissions

resilience4j:
  retry:
    instances:
      # Guards NotificationHttpSender's call to notification-service (internal, same network).
      # Only network failures/timeouts and 5xx/429 are retried (see TransientFailurePredicate) -
      # 4xx (e.g. bad recipient email) fails identically on every attempt, so it is never retried.
      notificationService:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
  circuitbreaker:
    instances:
      # Fast-fail when notification-service is persistently unhealthy so identity-service
      # threads are not consumed by retry storms (Rule 09/10). Only dependency failures count
      # toward the breaker (see TransientFailurePredicate); 4xx validation errors do not.
      notificationService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate

spring:
  application:
    name: identity-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
      - optional:classpath:platform/application-openapi.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/aisales_identity
    username: ${DB_USERNAME:aisales}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, profile, email
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
