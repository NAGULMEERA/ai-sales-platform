aisales:
  security:
    use-platform-defaults: false
    jwt:
      secret: aisales-dev-jwt-secret-key-change-in-production-min-256-bits
      access-token-expiration-ms: 3600000
      refresh-token-expiration-ms: 86400000
  auth:
    auto-login-after-register: false
    require-email-verification-for-login: true
    email-verification-expiration-hours: 24
    password-reset-expiration-hours: 1
    verification-link-base-url: http://localhost:3000/verify-email
    password-reset-link-base-url: http://localhost:3000/reset-password
  notification:
    enabled: true
    base-url: http://localhost:8090
    fallback-logging: true
  events:
    default-topic: aisales-events

spring:
  application:
    name: identity-service
  profiles:
    default: local
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/aisales_identity
    username: aisales
    password: aisales
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, profile, email
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
