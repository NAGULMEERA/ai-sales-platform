# Local Postman / IntelliJ profile.
# Email delivery is event-driven: Identity writes EmailVerificationRequested /
# PasswordResetRequested to the outbox; Notification consumes from Kafka.
# Requires: Postgres (5433), Kafka (9092), and notification-service for SMTP/Mailpit.
# Infra: docker compose -f deployment/docker-compose-infra.yml up -d

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  config:
    import:
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5433/aisales_identity
    username: aisales
    password: aisales
  kafka:
    bootstrap-servers: localhost:9092

management:
  tracing:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  security:
    jwt:
      signing-enabled: true
      private-key-location: classpath:jwt/local-private.pem
      public-key-location: classpath:jwt/local-public.pem
      key-id: aisales-1
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
      batch-size: 100
      parallelism: 4
      dispatch-interval-ms: 5000
      max-retries: 5
    inbox:
      enabled: false
  startup-validation:
    enabled: false
  auth:
    verification-link-base-url: http://localhost:8081/api/v1/auth/verify-email

logging:
  level:
    com.aisales.identity: ERROR
    org.springframework.cloud: ERROR
    com.netflix.discovery: ERROR
