# Local Postman / dev profile — no Eureka, Config Server, or Kafka required.
# Run: mvnw spring-boot:run -pl services/identity-service -Dspring-boot.run.profiles=local

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  config:
    import:
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5433/aisales_identity
    username: aisales
    password: aisales

management:
  tracing:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  security:
    jwt:
      secret: aisales-dev-jwt-secret-key-change-in-production-min-256-bits
  events:
    publisher: logging
    outbox:
      enabled: false
    inbox:
      enabled: false
  startup-validation:
    enabled: false
  notification:
    enabled: true
    base-url: http://localhost:8090
    fallback-logging: true
  auth:
    verification-link-base-url: http://localhost:8081/api/v1/auth/verify-email

logging:
  level:
    com.aisales.identity: ERROR
    org.springframework.cloud: ERROR
    com.netflix.discovery: ERROR
