# Production profile — secrets MUST come from Vault / Secret Manager → K8s env.
# SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  config:
    import:
      - optional:classpath:platform/application-prod.yml

aisales:
  cache:
    # RBAC permission cache (PlatformCacheService). Requires Redis in the environment.
    enabled: ${AISALES_CACHE_ENABLED:true}
    default-ttl: ${AISALES_CACHE_TTL:15m}
  security:
    jwt:
      signing-enabled: true
      # PKCS#8 PEM (inline) or file:/path/to/private.pem
      private-key-location: ${JWT_PRIVATE_KEY_PEM}
      public-key-location: ${JWT_PUBLIC_KEY_LOCATION}
      key-id: ${JWT_KEY_ID:aisales-1}
      require-issuer-audience: true
  startup-validation:
    enabled: true
    required-config-values:
      - aisales.security.jwt.private-key-location
      - aisales.security.jwt.public-key-location
      - spring.datasource.password
