# Production profile — secrets MUST come from Vault / Secret Manager → K8s env.
# SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

aisales:
  security:
    jwt:
      signing-enabled: true
      # PKCS#8 PEM (inline) or file:/path/to/private.pem
      private-key-location: ${JWT_PRIVATE_KEY_PEM}
      public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:jwt/local-public.pem}
      key-id: ${JWT_KEY_ID:aisales-1}
  startup-validation:
    enabled: true
    required-config-values:
      - aisales.security.jwt.private-key-location
      - spring.datasource.password
