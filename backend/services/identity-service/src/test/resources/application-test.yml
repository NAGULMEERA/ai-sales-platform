spring:
  cloud:
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  task:
    scheduling:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  auth:
    require-email-verification-for-login: false
    auto-login-after-register: false
  notification:
    enabled: false
    fallback-logging: true
  events:
    outbox:
      enabled: true
    inbox:
      enabled: false
    kafka:
      auto-create-topics: false
  cache:
    enabled: false
  startup-validation:
    enabled: false
  security:
    jwt:
      secret: test-jwt-secret-key-minimum-256-bits-for-integration-tests-only
