# Local profile — Postgres :5433, Kafka :9092, JWT verify via local public PEM / JWKS.
# Infra: docker compose -f deployment/docker-compose-infra.yml up -d postgres kafka

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  config:
    import:
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5433/lead_db
    username: aisales
    password: aisales
  kafka:
    bootstrap-servers: localhost:9092

management:
  tracing:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  security:
    jwt:
      public-key-location: classpath:jwt/local-public.pem
      key-id: aisales-1
  clients:
    customer-service:
      url: http://localhost:8084
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: true
  startup-validation:
    enabled: false

logging:
  level:
    com.aisales.lead: INFO
