server:
  port: 8084

spring:
  application:
    name: customer-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/customer_db
    username: aisales
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:aisales}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092

aisales:
  customer:
    matching:
      match-phone: true
      match-email: true
      match-whatsapp: true
      match-external-crm-id: true
      match-government-id: false
      weak-match-threshold: 2
  security:
    use-platform-defaults: true
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
