# Local profile — Postgres :5433, Kafka :9092, JWT via local public PEM.
# Infra: docker compose -f deployment/docker-compose-infra.yml up -d postgres kafka

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  config:
    import:
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_db
    username: aisales
    password: aisales
  kafka:
    bootstrap-servers: localhost:9092

management:
  tracing:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

aisales:
  security:
    jwt:
      public-key-location: classpath:jwt/local-public.pem
      key-id: aisales-1
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      # Enable with Kafka for plan-linked AI quota packages (SubscriptionPlanChanged / TenantCreated).
      enabled: true
  startup-validation:
    enabled: false
  clients:
    media-service:
      url: http://localhost:8095
  ai:
    llm:
      # Plug/flag switch — change only `provider` (STUB | GEMINI | OPENAI).
      # Dev default: Gemini. Offline without a key: set provider=STUB.
      provider: GEMINI
      gemini:
        enabled: true
        api-key: ${GEMINI_API_KEY:}
      openai:
        enabled: false
        api-key: ${OPENAI_API_KEY:}
    semantic-cache:
      enabled: false
    rag:
      # Plug/flag — change only `chunker` (CHAR | TOKEN). Dev/prod default: TOKEN.
      chunker: TOKEN
      # Plug/flag — AUTO | TEXT | PDF for media ingest extraction.
      extractor: AUTO
      # Plug/flag — change only `reranker` (NONE | STUB | TEI). Dev default: STUB (free).
      # Prod quality: reranker=TEI + rerank.tei.enabled=true (+ TEI cross-encoder on :8098).
      reranker: STUB
      rerank:
        tei:
          enabled: false
    embedding:
      # Plug/flag switch — change only `provider` (STUB | TEI | OPENAI).
      # Dev default: STUB (free). Quality local RAG: provider=TEI + open-source.enabled=true.
      # Paid: provider=OPENAI + commercial.enabled=true + OPENAI_API_KEY.
      provider: STUB
      stub:
        enabled: true
      default-model: stub-embedding-1024
      open-source:
        enabled: false
        base-url: http://localhost:8099
      commercial:
        enabled: false
        openai:
          api-key: ${OPENAI_API_KEY:}

logging:
  level:
    com.aisales.ai: INFO
