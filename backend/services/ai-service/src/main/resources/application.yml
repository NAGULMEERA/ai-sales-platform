server:
  port: 8088

spring:
  application:
    name: ai-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_db
    username: aisales
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:aisales}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

aisales:
  security:
    use-platform-defaults: true
  cache:
    enabled: false
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: false
  ai:
    llm:
      provider: STUB
    semantic-cache:
      enabled: true
      max-cosine-distance: 0.1
      default-ttl: 7d
      redis-ttl: 1h
    embedding:
      default-provider-kind: OPEN_SOURCE
      default-model: BAAI/bge-m3
      default-dimension: 1024
      open-source:
        enabled: true
        base-url: http://localhost:8099
        model: BAAI/bge-m3
        dimension: 1024
      commercial:
        enabled: false
        openai:
          api-key: ${OPENAI_API_KEY:}
          model: text-embedding-3-small
          dimension: 1536

resilience4j:
  retry:
    instances:
      bgeM3Embedding:
        max-attempts: 3
        wait-duration: 150ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      openAiEmbedding:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
  circuitbreaker:
    instances:
      openAiEmbedding:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate
