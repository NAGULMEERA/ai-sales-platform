server:
  port: 8088

spring:
  application:
    name: ai-service
  profiles:
    default: local
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:classpath:platform/application-observability.yml
      - optional:classpath:platform/application-cache.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_db
    username: aisales
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:aisales}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

aisales:
  security:
    use-platform-defaults: true
  clients:
    media-service:
      url: http://localhost:8095
  cache:
    enabled: false
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: true
  ai:
    quota:
      enabled: true
      daily-token-limit: 500000
      daily-execute-token-limit: 400000
      daily-embed-token-limit: 100000
      reserve-execute-tokens: 4096
      reserve-embed-tokens: 8192
      plans:
        FREE:
          daily-token-limit: 100000
          daily-execute-token-limit: 80000
          daily-embed-token-limit: 20000
        PREMIUM:
          daily-token-limit: 2000000
          daily-execute-token-limit: 1600000
          daily-embed-token-limit: 400000
    cost:
      # Ledger estimates only — not billing invoices
      enabled: true
      models:
        gpt-4o-mini:
          prompt-per-1k: 0.00015
          completion-per-1k: 0.0006
        gemini-2.0-flash:
          prompt-per-1k: 0.0001
          completion-per-1k: 0.0004
        stub-model:
          prompt-per-1k: 0
          completion-per-1k: 0
        stub-embedding-1024:
          embedding-per-1k: 0
        "BAAI/bge-m3":
          embedding-per-1k: 0
        text-embedding-3-small:
          embedding-per-1k: 0.00002
    llm:
      # Plug/flag: STUB | OPENAI | GEMINI (target client must be enabled below)
      provider: STUB
      openai:
        enabled: false
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com/v1
        model: gpt-4o-mini
        temperature: 0.2
        max-tokens: 2048
        connect-timeout-ms: 3000
        read-timeout-ms: 60000
        json-object-response: true
      gemini:
        enabled: false
        api-key: ${GEMINI_API_KEY:}
        base-url: https://generativelanguage.googleapis.com/v1beta
        model: gemini-2.0-flash
        temperature: 0.2
        max-output-tokens: 2048
        connect-timeout-ms: 3000
        read-timeout-ms: 60000
        json-object-response: true
    semantic-cache:
      enabled: true
      max-cosine-distance: 0.1
      default-ttl: 7d
      redis-ttl: 1h
    rag:
      default-top-k: 5
      max-cosine-distance: 0.45
      # Plug/flag: CHAR | TOKEN (TOKEN recommended for RAG quality; free/local)
      chunker: TOKEN
      # Plug/flag: AUTO | TEXT | PDF (AUTO picks from content-type / filename)
      extractor: AUTO
      char-window:
        chunk-size: 800
        overlap: 120
      token-window:
        chunk-size: 200
        overlap: 40
      # Plug/flag: NONE | STUB | TEI (STUB free local; TEI needs cross-encoder process)
      reranker: STUB
      rerank:
        candidate-multiplier: 3
        max-candidates: 30
        tei:
          enabled: false
          base-url: http://localhost:8098

    embedding:
      # Plug/flag: STUB | TEI | OPENAI (matching bean must be enabled below)
      provider: STUB
      default-provider-kind: OPEN_SOURCE
      default-model: stub-embedding-1024
      default-dimension: 1024
      stub:
        enabled: true
      open-source:
        enabled: false
        base-url: http://localhost:8099
        model: BAAI/bge-m3
        dimension: 1024
      commercial:
        enabled: false
        openai:
          api-key: ${OPENAI_API_KEY:}
          model: text-embedding-3-small
          dimension: 1536


resilience4j:
  retry:
    instances:
      bgeM3Embedding:
        max-attempts: 3
        wait-duration: 150ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      openAiEmbedding:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      openAiLlm:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      geminiLlm:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exception-predicate: com.aisales.common.observability.http.TransientFailurePredicate
  circuitbreaker:
    instances:
      openAiEmbedding:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      openAiLlm:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate
      geminiLlm:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-failure-predicate: com.aisales.common.observability.http.TransientFailurePredicate
