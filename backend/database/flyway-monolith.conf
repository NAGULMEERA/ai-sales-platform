# Flyway configuration – monolith lab database
# Usage: flyway -configFiles=database/flyway-monolith.conf migrate

flyway.url=jdbc:postgresql://localhost:5433/ai_sales_platform
flyway.user=aisales
flyway.password=aisales
flyway.schemas=public
flyway.locations=filesystem:database/migrations-monolith
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
