groups:
  - name: aisales-platform
    rules:
      - alert: ServiceDown
        expr: up{job="spring-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Prometheus target {{ $labels.instance }} has been unreachable for 2 minutes."
          runbook: "docs/12-operations/incident-response-runbook.md"

      - alert: HighHttp5xxRate
        expr: |
          sum by (application) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
          clamp_min(sum by (application) (rate(http_server_requests_seconds_count[5m])), 0.001)
            > 0.05
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "High 5xx rate on {{ $labels.application }}"
          description: "More than 5% of HTTP requests are failing with 5xx."
          runbook: "docs/12-operations/alerting-and-slos.md"

      - alert: HighHttpLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (application, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: medium
        annotations:
          summary: "High p99 latency on {{ $labels.application }}"
          description: "HTTP p99 latency exceeds 2s for 10 minutes."

      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Circuit breaker open: {{ $labels.name }}"
          description: "Resilience4j circuit breaker {{ $labels.name }} is open."

      - alert: OutboxLagHigh
        expr: |
          max by (application) (aisales_outbox_pending_total) > 1000
          or
          max by (application) (outbox_pending_total) > 1000
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "Outbox backlog high on {{ $labels.application }}"
          description: "Pending outbox events exceed 1000 for 10 minutes."
          runbook: "docs/12-operations/eventing-ops-matrix.md"

      - alert: JvmHeapPressure
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.90
        for: 10m
        labels:
          severity: medium
        annotations:
          summary: "JVM heap > 90% on {{ $labels.application }}"
          description: "Investigate memory leaks or raise container memory limits."
