# Shared NON-SECRET config only.
# Passwords, JWT secrets, OAuth/SMTP credentials must come from Vault / Secret Manager
# → Kubernetes Secret → environment variables (see deployment/kubernetes/external-secrets/).

spring:
  datasource:
    # URL/username may be overridden per service; password never stored here.
    username: ${DB_USERNAME:aisales}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

aisales:
  security:
    jwt:
      access-token-expiration-ms: 3600000
      refresh-token-expiration-ms: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
