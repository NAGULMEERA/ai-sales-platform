server:
  port: 8093

spring:
  application:
    name: analytics-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

aisales:
  security:
    use-platform-defaults: true
  events:
    default-topic: aisales-events
    outbox:
      enabled: true
    inbox:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
