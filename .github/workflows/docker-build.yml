name: Docker Build

on:
  push:
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - run: ./mvnw clean package -DskipTests -B
        working-directory: backend
      - run: docker build -t aisales/identity-service:${{ github.ref_name }} backend/services/identity-service
      - run: docker build -t aisales/tenant-service:${{ github.ref_name }} backend/services/tenant-service
