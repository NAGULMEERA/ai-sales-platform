name: Docker Build and Scan

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        required: true
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: backend/services/identity-service
            name: identity-service
          - path: backend/services/tenant-service
            name: tenant-service
          - path: backend/services/lead-service
            name: lead-service
          - path: backend/services/customer-service
            name: customer-service
          - path: backend/services/catalog-service
            name: catalog-service
          - path: backend/services/conversation-service
            name: conversation-service
          - path: backend/services/ai-service
            name: ai-service
          - path: backend/services/workflow-service
            name: workflow-service
          - path: backend/services/notification-service
            name: notification-service
          - path: backend/services/billing-service
            name: billing-service
          - path: backend/services/integration-service
            name: integration-service
          - path: backend/services/analytics-service
            name: analytics-service
          - path: backend/services/search-service
            name: search-service
          - path: backend/services/media-service
            name: media-service
          - path: backend/services/deal-service
            name: deal-service
          - path: backend/services/marketplace-service
            name: marketplace-service
          - path: infrastructure/api-gateway
            name: api-gateway
          - path: infrastructure/config-server
            name: config-server
          - path: infrastructure/service-registry
            name: service-registry
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
