openapi: 3.0.3
info:
  title: Tenant Service API
  version: 1.0.0
paths:
  /api/v1/tenants:
    get:
      summary: List tenants
      responses:
        '200':
          description: OK
    post:
      summary: Create tenant
      responses:
        '201':
          description: Created
  /api/v1/tenants/{id}:
    get:
      summary: Get tenant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
